name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build extension
        run: bun run build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Pack CRX
        run: |
          npm install -g crx@5.0.1
          crx pack dist -o xpaper-${{ steps.version.outputs.version }}.crx

      - name: Create ZIP for Chrome Web Store
        run: |
          cd dist
          zip -r ../xpaper-${{ steps.version.outputs.version }}-chrome-webstore.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xpaper-${{ steps.version.outputs.version }}.crx
            xpaper-${{ steps.version.outputs.version }}-chrome-webstore.zip
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
